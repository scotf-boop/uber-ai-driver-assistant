<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Uber AI Cloud V15.2</title><style>
body{margin:0;background:#071121;color:#fff;font-family:Arial,'Microsoft YaHei',sans-serif}.wrap{max-width:980px;margin:0 auto;padding:24px}.card{background:#0b1728;border:1px solid #29415f;border-radius:16px;padding:18px;margin:14px 0}.title{font-size:34px;font-weight:800}.sub{color:#a7bed8;margin-top:8px}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:700px){.row{grid-template-columns:1fr}.title{font-size:26px}}input,textarea,select{width:100%;box-sizing:border-box;background:#071121;color:#fff;border:1px solid #36577d;border-radius:12px;padding:12px;font-size:16px}textarea{min-height:160px}button{width:100%;border:0;border-radius:12px;padding:14px;font-size:18px;font-weight:800;background:#19aeea;color:white;cursor:pointer}.btn2{background:#102033;border:1px solid #36577d}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}@media(max-width:700px){.grid{grid-template-columns:1fr 1fr}}.metric{background:#071121;border:1px solid #29415f;border-radius:14px;padding:14px}.label{color:#9fb5d0;font-size:13px}.value{font-size:25px;font-weight:800;margin-top:6px}.good{color:#5cff9d}.warn{color:#ffd166}.bad{color:#ff6b6b}pre{white-space:pre-wrap;max-height:240px;overflow:auto;background:#020915;border:1px solid #29415f;border-radius:12px;padding:12px}.pill{display:inline-block;padding:8px 12px;border-radius:999px;background:#123251;border:1px solid #416a98;margin:6px 6px 0 0}.bigaction{font-size:30px;font-weight:900;margin:10px 0}</style></head><body><div class="wrap">
<div class="title">Uber AI Cloud {{version}}</div><div class="sub">OCR识别 · $/mile · $/hour · 接单建议 · 接客距离真实成本</div>
<div class="card"><div class="row"><div><label>订单类型</label><select><option>UberX</option><option>UberXL</option><option>Comfort</option><option>Black</option></select></div><div><label>GPS定位</label><input value="34.090281, -118.008974"></div></div></div>
<div class="card"><h3>上传Uber行程截图</h3><div class="row"><div><label>接客距离（英里，可不填）</label><input id="pickup" type="number" step="0.1" value="0"></div><div><label>每英里成本，默认0.25</label><input id="cost" type="number" step="0.01" value="0.25"></div></div><br><input id="file" type="file" accept="image/*"><br><br><button onclick="uploadImg()">上传截图并分析</button></div>
<div class="card"><h3>手动粘贴OCR文字 / 兜底分析</h3><textarea id="txt" placeholder="如果图片OCR不准，把识别文字或订单文字粘贴到这里"></textarea><br><br><button class="btn2" onclick="analyzeText()">从文字中提取收入/英里/时间并分析</button></div>
<div class="card" id="result"><h3>分析结果</h3><div class="sub">等待上传或粘贴文字。</div></div>
<div class="card"><h3>OCR识别文字</h3><pre id="ocr"></pre></div>
</div><script>
function cls(action){return action.includes('不建议')?'bad':(action.includes('谨慎')?'warn':'good')}
function render(data){
 document.getElementById('ocr').textContent=data.ocr_text||'';
 let a=data.analysis||{}; let e=data.extracted||{};
 if(!a.ok){document.getElementById('result').innerHTML='<h3>分析结果</h3><div class="bad">'+(a.error||data.error||'识别失败')+'</div><div class="sub">提取值：收入 '+e.income+' / 英里 '+e.miles+' / 时间 '+e.minutes+'</div>'; return;}
 document.getElementById('result').innerHTML=`<h3>分析结果</h3><div class="pill">评级：${a.level}</div><div class="pill">时间：${a.hours_text}</div><div class="bigaction ${cls(a.action)}">${a.action}</div><div class="sub">${a.reason}</div><br><div class="grid"><div class="metric"><div class="label">收入</div><div class="value">$${a.income}</div></div><div class="metric"><div class="label">行程英里</div><div class="value">${a.miles}</div></div><div class="metric"><div class="label">$/mile</div><div class="value">$${a.dollar_per_mile}</div></div><div class="metric"><div class="label">$/hour</div><div class="value">$${a.dollar_per_hour}</div></div><div class="metric"><div class="label">含接客真实$/mile</div><div class="value">$${a.real_dollar_per_mile}</div></div><div class="metric"><div class="label">扣成本净收入</div><div class="value">$${a.net_income}</div></div></div>`;
}
function formBase(){return {pickup_miles:document.getElementById('pickup').value,cost:document.getElementById('cost').value,fuel_cost_per_mile:document.getElementById('cost').value}}
async function analyzeText(){let b=formBase();b.text=document.getElementById('txt').value;let r=await fetch('/analyze_text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});render(await r.json())}
async function uploadImg(){let f=document.getElementById('file').files[0];if(!f){alert('先选择图片');return}let fd=new FormData();fd.append('file',f);fd.append('pickup_miles',document.getElementById('pickup').value);fd.append('fuel_cost_per_mile',document.getElementById('cost').value);let r=await fetch('/analyze_image',{method:'POST',body:fd});render(await r.json())}
</script></body></html>
