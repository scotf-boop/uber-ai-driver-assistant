<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ mode }}</title><style>body{background:#07111f;color:#e5eefb;font-family:Arial;margin:0}.card{max-width:420px;margin:60px auto;background:#0e1a2a;border:1px solid #26364c;border-radius:18px;padding:24px}input,button{width:100%;padding:13px;border-radius:12px;border:1px solid #334155;background:#081222;color:#fff;margin:8px 0;font-size:16px}button{background:#0ea5e9;font-weight:800}a{color:#93c5fd}</style></head><body><div class="card"><h1>{% if mode=='login' %}登录{% else %}注册{% endif %}</h1>{% with messages=get_flashed_messages() %}{% for m in messages %}<p>{{m}}</p>{% endfor %}{% endwith %}<form method="post"><input name="email" type="email" placeholder="邮箱"><input name="password" type="password" placeholder="密码，至少6位"><button>{% if mode=='login' %}登录{% else %}注册{% endif %}</button></form>{% if mode=='login' %}<a href="/register">没有账号？注册</a>{% else %}<a href="/login">已有账号？登录</a>{% endif %}<br><br><a href="/">返回首页</a></div></body></html>
