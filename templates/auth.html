
<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>登录注册</title><link rel="stylesheet" href="/static/style.css"></head><body><div class="wrap"><div class="card" style="max-width:520px;margin:40px auto"><h1>{% if mode=='register' %}注册{% else %}登录{% endif %}</h1>{% with messages=get_flashed_messages() %}{% if messages %}{% for m in messages %}<div class="notice">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}<form method="post"><label>邮箱</label><input name="email" type="email" required><label>密码</label><input name="password" type="password" required><button class="btn" type="submit">{% if mode=='register' %}注册{% else %}登录{% endif %}</button></form><p><a href="/">返回首页</a> · {% if mode=='register' %}<a href="/login">已有账号，登录</a>{% else %}<a href="/register">没有账号，注册</a>{% endif %}</p></div></div></body></html>
